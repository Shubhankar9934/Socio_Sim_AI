site_name: JADU — Socio Simulation AI
site_description: Computational model of collective human cognition under information pressure

# JADU API pages link to Python modules at repo root (outside docs/). Ignore those
# targets during link validation so `mkdocs build` / CI stay clean.
validation:
  links:
    not_found: ignore
  nav:
    omitted_files: info

theme:
  name: material
  palette:
    primary: deep purple
    accent: amber
nav:
  - Home: index.md
  - Overview: overview.md
  - Vision and goals: vision-and-goals.md
  - Architecture: architecture.md
  - Root Scripts: root-scripts.md
  - Doc inventory: DOC_INVENTORY.md
  - Examples: examples/README.md
  - JADU API reference (Postman):
      - Index: jadu-api/README.md
      - Page template: jadu-api/DOC_TEMPLATE.md
      - Population: jadu-api/population.md
      - Agents: jadu-api/agents.md
      - Survey: jadu-api/survey.md
      - WebSockets: jadu-api/websockets.md
      - Simulation: jadu-api/simulation.md
      - Analytics: jadu-api/analytics.md
      - Evaluation: jadu-api/evaluation.md
      - Discovery: jadu-api/discovery.md
      - Calibration: jadu-api/calibration.md
  - Module Reference:
    - Agents: modules/agents.md
    - Analytics: modules/analytics.md
    - API: modules/api.md
    - Calibration: modules/calibration.md
    - Config: modules/config.md
    - Core: modules/core.md
    - Causal: modules/causal.md
    - Discovery: modules/discovery.md
    - Data: modules/data.md
    - Evaluation: modules/evaluation.md
    - LLM: modules/llm.md
    - Media: modules/media.md
    - Memory: modules/memory.md
    - Population: modules/population.md
    - Postman: modules/postman.md
    - Research: modules/research.md
    - Simulation: modules/simulation.md
    - Social: modules/social.md
    - Storage: modules/storage.md
    - World: modules/world.md
    - Tests: modules/tests.md
markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
